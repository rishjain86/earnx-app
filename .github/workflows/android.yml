name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Prepare Web Folder
        run: |
          mkdir -p www
          cp index.html www/ || true
          cp script.js www/ || true
          cp style.css www/ || true
          cp -r assets www/assets/ || true

      - name: Generate Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Update App Version
        run: |
          sed -i 's/versionCode [0-9]*/versionCode 7/g' android/app/build.gradle || true
          sed -i 's/versionName "[0-9.]*"/versionName "7.0"/g' android/app/build.gradle || true

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
