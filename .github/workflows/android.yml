name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/assets --save-dev --legacy-peer-deps

      - name: Prepare Web Folder
        run: |
          mkdir -p www
          cp index.html www/ || true
          cp script.js www/ || true
          cp style.css www/ || true
          cp sw.js www/ || true
          cp -r assets www/assets/ || true

      - name: Generate Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Generate App Icons & Splash
        run: |
          npx capacitor-assets generate --android

      - name: Update App Version & Android SDK
        run: |
          # Version 8.0 update
          sed -i 's/versionCode [0-9]*/versionCode 8/g' android/app/build.gradle || true
          sed -i 's/versionName "[0-9.]*"/versionName "8.0"/g' android/app/build.gradle || true
          
          # Fix for "Older version of Android" warning (API 34/Android 14)
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/g' android/variables.gradle || true
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 34/g' android/variables.gradle || true

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
