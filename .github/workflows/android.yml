name: EarnX APK Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/share

      - name: Prepare Web Folder
        run: |
          mkdir www
          cp index.html www/

      - name: Generate Android Project
        run: npx cap add android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK Manually (Pro Method)
        run: |
          # 1. Secret text ko wapas Mohar (File) mein badlo
          echo "${{ secrets.KEYSTORE_BASE64 }}" > base64.txt
          base64 --decode base64.txt > earnx.jks
          
          # 2. Server pe jo bhi latest Android tool ho, use pakdo
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 3. APK file dhoondho
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          
          # 4. APK ko Zipalign (Optimize) karo
          $BUILD_TOOLS/zipalign -v -p 4 $APK_PATH EarnX-Signed.apk
          
          # 5. Keystore ke andar se Asli Alias ka naam auto-detect karo
          REAL_ALIAS=$(keytool -v -list -keystore earnx.jks -storepass "${{ secrets.STORE_PASSWORD }}" | grep "Alias name:" | cut -d: -f2 | xargs)
          echo "Asli Alias mil gaya: $REAL_ALIAS"
          
          # 6. Us Asli Alias se APK par Sign karo
          $BUILD_TOOLS/apksigner sign --ks earnx.jks --ks-key-alias "$REAL_ALIAS" --ks-pass "pass:${{ secrets.STORE_PASSWORD }}" --key-pass "pass:${{ secrets.KEY_PASSWORD }}" EarnX-Signed.apk

      - name: Upload Final Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: EarnX-Signed-App
          path: EarnX-Signed.apk
