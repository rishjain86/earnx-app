name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/share@5 --legacy-peer-deps
          npm install @capacitor-community/admob@5 --legacy-peer-deps

      - name: Prepare Web Folder
        run: |
          mkdir -p www
          cp index.html www/
          cp -r assets www/assets/

      - name: Generate Android Project
        run: npx cap add android

      - name: Update SDK Version & Inject AdMob Meta-data
        run: |
          sed -i "s/compileSdkVersion = [0-9]*/compileSdkVersion = 34/g" android/variables.gradle
          sed -i "s/targetSdkVersion = [0-9]*/targetSdkVersion = 34/g" android/variables.gradle
          sed -i '/<application/a \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/>' android/app/src/main/AndroidManifest.xml

      - name: Generate App Logo and Splash Screen
        run: npx --yes @capacitor/assets generate --android --assetPath assets

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK with EarnX Password
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          $BUILD_TOOLS/zipalign -v -p 4 $APK_PATH EarnX-Signed.apk
          keytool -genkey -v -keystore earnx_new.jks -keyalg RSA -keysize 2048 -validity 10000 -alias earnx_alias -dname "CN=EarnX, OU=App, O=EarnX, L=City, S=State, C=IN" -storepass "EarnX@2024" -keypass "EarnX@2024"
          $BUILD_TOOLS/apksigner sign --ks earnx_new.jks --ks-pass pass:"EarnX@2024" --out EarnX-Final.apk EarnX-Signed.apk

      - name: Upload Final Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: EarnX-App
          path: EarnX-Final.apk
