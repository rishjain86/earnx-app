<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnX - Rewards Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f172a; --bg-darker: #020617; --card-bg: #1e293b; --card-border: #334155; --primary: #10b981; --primary-dark: #059669; --primary-grad: linear-gradient(135deg, #10b981, #059669); --text-light: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444; --warning: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Inter', sans-serif; background: #000; color: var(--text-light); display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 480px; height: 100vh; height: 100dvh; background: var(--bg-dark); position: relative; overflow-y: auto; overflow-x: hidden; padding-bottom: 70px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #app::-webkit-scrollbar { display: none; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; } .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .btn { background: var(--primary-grad); color: white; border: none; padding: 14px 20px; border-radius: 12px; font-size: 1rem; font-weight: 600; width: 100%; cursor: pointer; }
        .btn:disabled { background: var(--card-border); color: var(--text-muted); cursor: not-allowed; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--card-bg); border-top: 1px solid var(--card-border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; }
        .nav-item i { font-size: 1.2rem; margin-bottom: 4px; } .nav-item.active { color: var(--primary); }
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 30px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--card-bg); transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); background: conic-gradient( #10b981 0 60deg, #059669 60deg 120deg, #10b981 120deg 180deg, #059669 180deg 240deg, #10b981 240deg 300deg, #059669 300deg 360deg ); }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--warning); z-index: 10; }
        #custom-splash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 999999; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--primary); padding: 12px 20px; border-radius: 8px; color: white; z-index: 10000; display: none; }
        input { width: 100%; background: var(--bg-darker); border: 1px solid var(--card-border); color: white; padding: 14px; border-radius: 10px; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>
<div id="custom-splash"><img src="assets/splash.png" style="width:70vw;"></div>
<div id="app">
    <div id="toast"></div>
    <div id="screen-login" class="screen active">
        <div style="text-align:center; margin-top:60px;">
            <img src="assets/icon.png" style="width:100px; margin-bottom:20px;">
            <h1>EarnX</h1>
            <div class="card">
                <h3>Login to Continue</h3>
                <div id="web-login-section"><button class="btn mt-2" onclick="loginWithGoogle()">Login with Google</button></div>
                <div id="app-login-section" style="display:none;">
                    <input type="email" id="email-input" placeholder="Enter Email">
                    <input type="password" id="password-input" placeholder="Enter Password">
                    <button class="btn" onclick="loginWithEmail()">Login / Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <div class="header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div style="font-size:1.5rem; font-weight:bold; color:var(--primary);">EarnX</div>
            <div class="coin-badge" style="background:rgba(16,185,129,0.1); padding:5px 15px; border-radius:20px; color:var(--primary);">
                <i class="fas fa-coins"></i> <span class="global-coin-display">0</span>
            </div>
        </div>
        <div class="card" style="text-align:center;">
            <p>Total Balance</p>
            <h2 style="font-size:2.5rem; margin:10px 0;"><span class="global-coin-display">0</span></h2>
            <button class="btn" id="btn-checkin" onclick="dailyCheckIn()">Daily Check-in (+50)</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="card" onclick="nav('tasks')" style="text-align:center;"><i class="fas fa-tasks"></i><br>Tasks</div>
            <div class="card" onclick="nav('spin')" style="text-align:center;"><i class="fas fa-sync"></i><br>Spin</div>
            <div class="card" onclick="nav('referral')" style="text-align:center;"><i class="fas fa-users"></i><br>Refer</div>
            <div class="card" onclick="nav('profile')" style="text-align:center;"><i class="fas fa-user"></i><br>Profile</div>
        </div>
    </div>
    <div id="screen-tasks" class="screen">
        <h2>Earn Tasks</h2>
        <div class="card">
            <h3>Watch Video</h3>
            <p>Reward: 100 Coins</p>
            <button class="btn mt-2" id="btn-watch" onclick="doWatchTask()">Watch Ad</button>
        </div>
        <div class="card">
            <h3>Stay Task</h3>
            <p>Wait 15s. Reward: 200 Coins</p>
            <button class="btn mt-2" id="btn-stay" onclick="doStayTask()">Start Task</button>
        </div>
    </div>

    <div id="screen-spin" class="screen" style="text-align:center;">
        <h2>Spin & Earn</h2>
        <p>Spins Left: <span id="spin-count-display">5</span></p>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="wheel-inner"></div>
        </div>
        <button class="btn" id="btn-spin" onclick="spinWheel()">SPIN NOW</button>
    </div>

    <div id="screen-profile" class="screen">
        <h2>Profile</h2>
        <div class="card" style="text-align:center;">
            <div style="font-size:3rem; margin-bottom:10px;"><i class="fas fa-user-circle"></i></div>
            <h3 id="profile-email">User</h3>
            <p id="profile-uid">ID: ---</p>
        </div>
        <button class="btn" style="background:var(--danger);" onclick="logout()">Logout</button>
    </div>

    <div class="bottom-nav" id="bottom-nav" style="display:none;">
        <div class="nav-item active" onclick="nav('home')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="nav('tasks')"><i class="fas fa-tasks"></i><span>Tasks</span></div>
        <div class="nav-item" onclick="nav('spin')"><i class="fas fa-sync"></i><span>Spin</span></div>
        <div class="nav-item" onclick="nav('profile')"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCpS_rr77wh23C2LYl6xCSTyptMKlITauk", authDomain: "dukaan-platform.firebaseapp.com", projectId: "dukaan-platform", storageBucket: "dukaan-platform.firebasestorage.app", messagingSenderId: "75765851780", appId: "1:75765851780:web:b6782abb897594b89c84d1" };
    const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); window.db = db;

    onAuthStateChanged(auth, async (user) => {
        if(user){ 
            window.currentUser = user; 
            await window.syncUserWithFirebase(user);
            window.nav('home');
        } else { window.nav('login'); }
    });

    window.syncUserWithFirebase = async (user) => {
        const ref = doc(db, "earnx_users", user.uid);
        const snap = await getDoc(ref);
        if(!snap.exists()){
            const data = { coins: 0, createdAt: Date.now() };
            await setDoc(ref, data);
            window.state.user.coins = 0;
        } else {
            window.state.user.coins = snap.data().coins || 0;
        }
        window.saveState();
    };

    window.loginWithGoogle = () => { signInWithPopup(auth, new GoogleAuthProvider()); };
    window.loginWithEmail = async () => {
        const e = document.getElementById('email-input').value; 
        const p = document.getElementById('password-input').value;
        try { await signInWithEmailAndPassword(auth, e, p); } catch { await createUserWithEmailAndPassword(auth, e, p); }
    };
    window.logout = () => { signOut(auth); localStorage.clear(); location.reload(); };
</script>
<script>
    // 🔥 REAL AD CONFIG 🔥
    const REAL_AD_UNIT_ID = "ca-app-pub-6519206650027176/8005768127";
    let admobLoaded = false; let isTimeLocked = true; let serverTimeOffset = 0;

    // Secure Time Sync
    async function syncSecureTime() {
        try { 
            const r = await fetch("https://worldtimeapi.org/api/timezone/Etc/UTC"); 
            const d = await r.json(); 
            serverTimeOffset = new Date(d.datetime).getTime() - Date.now(); 
            isTimeLocked = false; 
        } catch { isTimeLocked = false; }
    }
    window.getTrueTime = () => Date.now() + serverTimeOffset;

    // Real Ad Function
    async function showRealAd(callback) {
        if (window.Capacitor && window.Capacitor.Plugins.AdMob) {
            const { AdMob } = window.Capacitor.Plugins;
            try {
                window.showToast("Loading Real Ad...");
                await AdMob.prepareRewardVideoAd({ adId: REAL_AD_UNIT_ID });
                const rewardedListener = AdMob.addListener('onRewardedVideoAdRewarded', (reward) => {
                    callback();
                    rewardedListener.remove();
                });
                await AdMob.showRewardVideoAd();
            } catch (e) { window.showToast("Ad Failed to Load."); }
        } else {
            window.showToast("Browser: Simulating Ad...");
            setTimeout(callback, 3000);
        }
    }

    // Task Functions
    window.doWatchTask = () => {
        if(isTimeLocked) return window.showToast("Securing Connection...");
        showRealAd(() => { 
            window.state.user.coins += 100; 
            window.saveState(); 
            window.showToast("100 Coins Added!"); 
        });
    };

    // UI Helpers
    window.nav = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById('screen-' + id);
        if(target) target.classList.add('active');
        document.getElementById('bottom-nav').style.display = (id === 'login') ? 'none' : 'flex';
    };

    window.showToast = (m) => { 
        const t = document.getElementById('toast'); 
        t.innerText = m; t.style.display = 'block'; 
        setTimeout(() => t.style.display = 'none', 3000); 
    };

    // State Management
    window.state = JSON.parse(localStorage.getItem('earnx_state')) || { user:{coins:0}, tasks:{lastWatch:0} };
    window.saveState = async () => { 
        localStorage.setItem('earnx_state', JSON.stringify(window.state)); 
        window.updateUI(); 
        if(window.currentUser) {
            const ref = doc(window.db, "earnx_users", window.currentUser.uid);
            await updateDoc(ref, { coins: window.state.user.coins });
        }
    };
    window.updateUI = () => { 
        document.querySelectorAll('.global-coin-display').forEach(el => el.innerText = window.state.user.coins); 
        if(window.currentUser) {
            document.getElementById('profile-email').innerText = window.currentUser.email;
            document.getElementById('profile-uid').innerText = "ID: " + window.currentUser.uid.substring(0,10);
        }
    };

    document.addEventListener("DOMContentLoaded", () => {
        syncSecureTime();
        if (window.Capacitor) {
            document.getElementById('web-login-section').style.display = 'none';
            document.getElementById('app-login-section').style.display = 'block';
            window.Capacitor.Plugins.AdMob.initialize(); admobLoaded = true;
        }
        setTimeout(() => document.getElementById('custom-splash').style.display = 'none', 2500);
    });
</script>
</body>
</html>
